# fly.toml app configuration file generated for bac-agent-snowy-thunder-4972 on 2026-03-16T06:54:39Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bac-agent'
primary_region = 'cdg'


[build]
  dockerfile = 'crates/agent/Dockerfile'

[env]
  HOST = '0.0.0.0'
  PORT = '8081'
  ZEROCLAW_ALLOW_PUBLIC_BIND = '1'

[[services]]
  protocol = 'tcp'
  internal_port = 8081

  [[services.ports]]
    port = 80
    handlers = ['http']

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

[[vm]]
  memory = '512'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
