services:
  - name: bac-api
    type: web
    region: oregon
    runtime: go
    buildCommand: cd src/api && go build -o bac-api .
    startCommand: ./bac-api
    envVars:
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OLLAMA_URL
        sync: false
      - key: TURSO_DB_URL
        sync: false
      - key: REDIS_URL
        sync: false
    repo: https://github.com/amdajhbdh/bac
    branch: first_bm

  - name: bac-agent
    type: web
    region: oregon
    runtime: go
    buildCommand: cd src/agent && go build -o agent ./cmd/main.go
    startCommand: ./agent -server
    envVars:
      - key: PORT
        value: "8081"
      - key: DATABASE_URL
        sync: false
      - key: OLLAMA_URL
        sync: false
    repo: https://github.com/amdajhbdh/bac
    branch: first_bm
