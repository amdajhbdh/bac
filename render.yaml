services:
  - name: bac-api
    type: web
    region: oregon
    buildCommand: cd src/api && go build -o bac-api .
    startCommand: ./bac-api
    envVars:
      - key: PORT
        value: "8080"
      - key: NEON_DB_URL
        value: "postgresql://neondb_owner:npg_ubkCLmerS03Z@ep-fragrant-violet-ai2ew4vx-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require"
      - key: JWT_SECRET
        value: "bac-unified-jwt-secret-2026-change-in-production"
      - key: OLLAMA_URL
        value: "https://bac-api.amdajhbdh.workers.dev"
      - key: TURSO_DB_URL
        value: ""
      - key: REDIS_URL
        value: ""
    repo: https://github.com/amdajhbdh/bac
    branch: first_bm

  - name: bac-agent
    type: web
    region: oregon
    buildCommand: cd src/agent && go build -o agent ./cmd/main.go
    startCommand: ./agent -server
    envVars:
      - key: PORT
        value: "8081"
      - key: NEON_DB_URL
        value: "postgresql://neondb_owner:npg_ubkCLmerS03Z@ep-fragrant-violet-ai2ew4vx-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require"
      - key: OLLAMA_URL
        value: "https://bac-api.amdajhbdh.workers.dev"
      - key: TURSO_DB_URL
        value: ""
      - key: REDIS_URL
        value: ""
    repo: https://github.com/amdajhbdh/bac
    branch: first_bm
