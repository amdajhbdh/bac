[tools]
go = "1.25"
node = "22"
python = "3.11"
rust = "1.85"
podman = "latest"
wrangler = "latest"

[env]
VAULT_PATH = "/home/med/Documents/bac/resources/notes/Study-Vault"
GITHUB_REPO = "mednou/study-vault"

[tasks]
install-go = "go install golang.org/dl/go1.25@latest && go1.25 download"
install-node = "corepack enable && yarn install"
install-rust = "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y"
install-all = "just install-go && just install-node && just install-rust"

# Vault sync
sync-vault = "just sync-vault"

# Deployments
deploy-render = "just deploy-render"
deploy-cf = "just deploy-cf"
deploy-openclaw = "just deploy-openclaw"

# Full deploy
full-deploy = "just sync-deploy"

# Health checks
health = "just health-all"

# Vault status
vault-status = "just vault-status"
