version: "3.8"

services:
  # PostgreSQL with pgvector
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: bac
      POSTGRES_PASSWORD: bacsecret
      POSTGRES_DB: bac_unified
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bac -d bac_unified"]
      interval: 5s
      timeout: 5s
      retries: 5

  # API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://bac:bacsecret@postgres:5432/bac_unified?sslmode=disable
      - PORT=8080
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data: