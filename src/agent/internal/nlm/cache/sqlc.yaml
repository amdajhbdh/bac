version: "2"
sql:
  - schema: "schema.sql"
    queries: "queries.sql"
    engine: "sqlite"
    database:
      uri: "file:nlm_cache.db"
    gen:
      go:
        package: "cache"
        out: "."
        sql_package: "database/sql"
        emit_json_tags: true
        emit_interface: false
        emit_exact_table_names: false
