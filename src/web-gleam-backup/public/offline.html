<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - BAC Unified</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: #f0f0f0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 24px;
    }
    p {
      color: #666;
      margin-bottom: 20px;
      line-height: 1.6;
    }
    .retry-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    .features {
      margin-top: 30px;
      text-align: left;
    }
    .features h3 {
      color: #333;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .features ul {
      list-style: none;
    }
    .features li {
      color: #666;
      font-size: 13px;
      padding: 5px 0;
      display: flex;
      align-items: center;
    }
    .features li::before {
      content: '✓';
      color: #667eea;
      margin-right: 8px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Vous êtes hors ligne</h1>
    <p>Il semble que vous ayez perdu votre connexion Internet. Ne vous inquietez pas, certaines fonctionnalités restent disponibles!</p>
    <button class="retry-btn" onclick="location.reload()">Réessayer</button>
    
    <div class="features">
      <h3>Fonctionnalités hors ligne:</h3>
      <ul>
        <li>Questions précédemment consultées</li>
        <li>Pratiquez vos réponses</li>
        <li>Voir vos statistiques</li>
        <li>Prévisions d'examens</li>
      </ul>
    </div>
  </div>
</body>
</html>
