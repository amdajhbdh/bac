apiVersion: apps/v1
kind: Deployment
metadata:
  name: bac-api
  labels:
    app: bac-api
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bac-api
  template:
    metadata:
      labels:
        app: bac-api
        tier: backend
    spec:
      containers:
      - name: api
        image: bac-unified/api:latest
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: NEON_DB_URL
          valueFrom:
            secretKeyRef:
              name: bac-secrets
              key: neon-db-url
        - name: TURSO_DB_URL
          valueFrom:
            secretKeyRef:
              name: bac-secrets
              key: turso-db-url
        - name: GARAGE_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: bac-config
              key: garage-endpoint
        - name: GARAGE_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: bac-secrets
              key: garage-access-key
        - name: GARAGE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: bac-secrets
              key: garage-secret-key
        - name: OLLAMA_HOST
          value: "http://ollama:11434"
        - name: ELASTICSEARCH_URL
          value: "http://elasticsearch:9200"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
      restartPolicy: Always
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bac-agent
  labels:
    app: bac-agent
    tier: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bac-agent
  template:
    metadata:
      labels:
        app: bac-agent
        tier: worker
    spec:
      containers:
      - name: agent
        image: bac-unified/agent:latest
        env:
        - name: NEON_DB_URL
          valueFrom:
            secretKeyRef:
              name: bac-secrets
              key: neon-db-url
        - name: TURSO_DB_URL
          valueFrom:
            secretKeyRef:
              name: bac-secrets
              key: turso-db-url
        - name: GARAGE_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: bac-config
              key: garage-endpoint
        - name: OLLAMA_HOST
          value: "http://ollama:11434"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      restartPolicy: Always
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  labels:
    app: ollama
    tier: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
        tier: ai
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "8Gi"
            cpu: "4000m"
        volumeMounts:
        - name: models
          mountPath: /root/.ollama
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: ollama-models
      restartPolicy: Always
