replicaCount: 2

image:
  repository: bac-unified
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: api.bac-unified.mr
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: bac-tls
      hosts:
        - api.bac-unified.mr

resources:
  api:
    limits:
      memory: 512Mi
      cpu: 500m
    requests:
      memory: 256Mi
      cpu: 250m
  agent:
    limits:
      memory: 1Gi
      cpu: 1000m
    requests:
      memory: 512Mi
      cpu: 500m

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

nodeSelector: {}

tolerations: []

affinity: {}

config:
  garageEndpoint: "http://garage:3900"
  elasticsearchUrl: "http://elasticsearch:9200"
  redisUrl: "redis://redis:6379"
  logLevel: "info"

persistence:
  ollama:
    enabled: true
    size: 50Gi
    storageClass: standard
