apiVersion: apps/v1
kind: Deployment
metadata:
  name: bac-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bac-api
  template:
    metadata:
      labels:
        app: bac-api
    spec:
      containers:
        - name: api
          image: bac-unified/api:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
