# OpenCrust Configuration for BAC Unified
# Vault Management + Telegram/WhatsApp Access

[model]
provider = "openai"
model = "llama3.2:3b"
base_url = "http://ollama:11434/v1"

[channels.telegram]
enabled = true

[channels.whatsapp]
enabled = true
mode = "personal"

[memory]
type = "sqlite"
path = "/app/data/memory.db"

[tools]
enabled = ["shell", "http"]

[tools.vault]
enabled = true
vault_path = "/vault"
git_remote = "https://github.com/amdajhbdh/notes.git"

[tools.ocr]
enabled = true
tesseract_lang = "ara+fra+eng"
output_dir = "/vault/05-Extracted"

[security]
allowed_commands = ["git", "tesseract", "python3"]
max_tool_calls = 20
