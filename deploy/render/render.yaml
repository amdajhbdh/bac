# Render Blueprint for BAC Unified
# Deploy at: https://dashboard.render.com/blueprints
# Note: Uses Docker since Render doesn't support Rust natively

services:
  # BAC Agent (Rust)
  - type: web
    name: bac-agent
    plan: free
    runtime: docker
    dockerfilePath: crates/agent/Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: "8081"
      - key: RUST_LOG
        value: info

  # BAC API (Rust)
  - type: web
    name: bac-api
    plan: free
    runtime: docker
    dockerfilePath: crates/api/Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false

  # BAC OCR (Rust)
  - type: web
    name: bac-ocr
    plan: free
    runtime: docker
    dockerfilePath: crates/ocr/Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: "8082"

  # BAC Streaming (Rust)
  - type: web
    name: bac-streaming
    plan: free
    runtime: docker
    dockerfilePath: crates/streaming/Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: "8083"

  # Web Frontend (Node.js)
  - type: web
    name: bac-web
    plan: free
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_URL
        value: https://bac-api.onrender.com
