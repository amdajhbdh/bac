# Cloudflare Pages Configuration
name = "bac-unified"
type = "pages"
compatibility_date = "2024-01-01"

[build]
command = "npm run build"
cwd = "src/web"

[build.environment]
NODE_VERSION = "20"

[[redirects]]
from = "/api/*"
to = "https://bac-api.onrender.com/api/:splat"
status = 200

[[redirects]]
from = "/agent/*"
to = "https://bac-agent.onrender.com/:splat"
status = 200

[[redirects]]
from = "/health"
to = "https://bac-api.onrender.com/health"
status = 200

[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
