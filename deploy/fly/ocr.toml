# Fly.io Configuration for BAC OCR Service
# Deploy with: fly launch --config deploy/fly/ocr.toml

app = "bac-ocr"

kill_signal = "SIGINT"
kill_timeout = 5

[build]
  context = "."
  dockerfile = "crates/ocr/Dockerfile"

[env]
  PORT = "8082"

[[services]]
  internal_port = 8082
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

[machine]
  memory = "512"
  cpu = 1
