# Docker Compose for BAC Unified Services
# OpenCrust (Rust) for Telegram/WhatsApp + Custom Tools

services:
  # OpenCrust AI Agent (Rust rewrite of OpenClaw)
  opencrust:
    image: ghcr.io/opencrust-org/opencrust:latest
    container_name: bac-opencrust
    volumes:
      - ./opencrust/data:/app/data
      - ./opencrust/config.yaml:/app/config.yaml:ro
      - ../resources/notes:/vault:ro
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_BASE_URL=http://ollama:11434
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - bac-network
    ports:
      - "8082:8082"

  # BAC API
  api:
    build:
      context: ../src/api
      dockerfile: Dockerfile
    container_name: bac-api
    volumes:
      - ./data:/data
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - bac-network
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  # BAC Gateway (Rust)
  gateway:
    build:
      context: ../src/gateway
      dockerfile: Dockerfile
    container_name: bac-gateway
    environment:
      - OCR_SERVICE_URL=http://ocr-service:3000
    volumes:
      - ./animations:/tmp/animations
    restart: unless-stopped
    networks:
      - bac-network
    ports:
      - "8081:8081"

  # OCR Service
  ocr-service:
    build:
      context: ../src/ocr-service
      dockerfile: Dockerfile
    container_name: bac-ocr
    volumes:
      - ../resources/notes:/vault
    environment:
      - TESSERACT_LANG=ara+fra+eng
    restart: unless-stopped
    networks:
      - bac-network
    ports:
      - "3000:3000"

  # Ollama (Local AI)
  ollama:
    image: ollama/ollama:latest
    container_name: bac-ollama
    volumes:
      - ./ollama:/root/.ollama
    restart: unless-stopped
    networks:
      - bac-network
    ports:
      - "11434:11434"

  # PostgreSQL + pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bac-postgres
    volumes:
      - ./postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    restart: unless-stopped
    networks:
      - bac-network
    ports:
      - "5432:5432"

networks:
  bac-network:
    driver: bridge
