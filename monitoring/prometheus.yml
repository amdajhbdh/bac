global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'ai-agent'
    static_configs:
      - targets: ['ai-agent:8080']

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'ocr-pipeline'
    static_configs:
      - targets: ['ocr-pipeline:8080']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:9187']  # Assuming postgres exporter

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:9121']  # Assuming redis exporter